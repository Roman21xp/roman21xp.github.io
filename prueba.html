<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>tiempo hora</h1>
    <input type="button" value="RUN" id="run">
    <div id="resultado"></div> 
    <script>
        //variables
        let boton=document.getElementById("run")
        let resultado=document.getElementById("resultado")

        //eventos
        boton.addEventListener("click", (e)=> {
            fetch("https://timeapi.io/api/Time/current/zone?timeZone=Europe/Madrid")
            .then((response) => {
                resultado.innerHTML="Todo Bien"
                return response.json()
            })
            .then(data => resultado.innerHTML=data.time)
            .catch(error => resultado.innerHTML="ERRRRRROR: ")
        })
    </script>
</body>
</html>
